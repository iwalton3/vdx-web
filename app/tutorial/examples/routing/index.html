<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Routing</title>
    <style>
        body { font-family: system-ui, sans-serif; }
        nav { display: flex; gap: 16px; margin-bottom: 8px; }
        nav a { color: var(--primary-color, #007bff); text-decoration: none; font-weight: 600; }
        hr { border: none; border-top: 1px solid #8884; margin: 12px 0 20px; }
    </style>

<body>
    <nav>
        <router-link to="/">Home</router-link>

    <!-- The router renders the active page here. -->
    <router-outlet></router-outlet>

    <script type="module">
        import './App.js';
    </script>
</body>
</html>
